<blockquote>
<p>gulp-sass报错解决方案</p>
</blockquote>
<h3 id="-">首先是下载项目</h3>
<p><code>git clone https://github.com/div-wang/div-wang.github.io.git</code></p>
<h3 id="-">然后进入项目目录</h3>
<p><code>cd div-wang.github.io</code></p>

<p><code>npm install</code></p>
<h4 id="-">如果报错请执行</h4>

<code>npm install gulp-sass</code></p>
